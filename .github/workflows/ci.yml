name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure docker compose plugin
        uses: docker/setup-compose-action@v1
        with:
          version: latest

      - name: Start tax-service (Docker Compose)
        working-directory: tax-service
        run: |
          docker compose up -d --build

      - name: Wait for tax-service readiness
        run: |
          for i in $(seq 1 30); do
            if curl -sSf http://localhost:8000/health >/dev/null 2>&1; then
              echo "tax-service ready"
              exit 0
            fi
            sleep 2
          done
          echo "tax-service not ready" >&2
          exit 1

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'
      
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Run .NET tests
        run: |
          dotnet build OrderProcessor/OrderProcessorDemo.slnx --configuration Release
          dotnet test OrderProcessor/OrderProcessor.Tests/OrderProcessor.Tests.csproj -c Release --no-build --verbosity normal

      - name: Install CMake and build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential ccache

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-ccache-${{ hashFiles('OrderProcessorCpp/**/*.cpp', 'OrderProcessorCpp/**/*.h', 'OrderProcessorCpp/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Configure and build C++ project
        run: |
          cmake -S OrderProcessorCpp -B OrderProcessorCpp/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build OrderProcessorCpp/build --config Release -- -j

      - name: Run C++ tests (ctest)
        run: |
          ctest --test-dir OrderProcessorCpp/build --output-on-failure -V

      - name: Tear down tax-service
        if: always()
        working-directory: tax-service
        run: |
          docker compose down --remove-orphans
